name: Build MacOS

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/**'
      - 'scripts/**'
      - 'vkCompViz/**'
      - 'examples/**'
    branches:
      - main

jobs:
  build:
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v3
      - name: Run build script
        run: ./scripts/buildOnMacOS-26.sh
